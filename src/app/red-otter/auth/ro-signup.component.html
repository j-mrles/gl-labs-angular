<div class="ro-auth">
  <!-- Left image -->
  <div class="ro-auth__image">
    <img
      src="https://images.unsplash.com/photo-1564013799919-ab600027ffc6?w=1200&q=80&fit=crop"
      alt="Luxury home with pool and palm trees"
    />
    <div class="ro-auth__image-overlay"></div>
    <div class="ro-auth__image-dark"></div>
    <div class="ro-auth__image-text">
      <div class="ro-auth__image-card">
        <h2>Your smartest<br/><span class="accent">investment starts here.</span></h2>
        <p>Join thousands of home buyers who use Otis to make data-driven decisions.</p>
      </div>
    </div>
  </div>

  <!-- Right form -->
  <div class="ro-auth__form-wrap">
    <div class="ro-auth__card">
      <h1>Start your free trial</h1>
      <p class="ro-auth__subtitle">14 days free. $24/mo after. Cancel anytime.</p>

      <form class="ro-auth__form" (ngSubmit)="handleSubmit()">
        <input
          class="ro-auth__input"
          type="text"
          placeholder="Full name"
          [(ngModel)]="name"
          name="name"
        />
        <input
          class="ro-auth__input"
          type="email"
          placeholder="Email"
          [(ngModel)]="email"
          name="email"
          required
        />
        <input
          class="ro-auth__input"
          type="password"
          placeholder="Password (8+ characters)"
          [(ngModel)]="password"
          name="password"
          required
          minlength="8"
        />

        <div class="ro-auth__error" *ngIf="error">
          <span>✕</span> {{ error }}
        </div>

        <button class="ro-auth__submit" type="submit" [disabled]="loading">
          {{ loading ? 'Creating account...' : 'Create account' }}
        </button>
      </form>

      <p class="ro-auth__footer">
        Already have an account? <a routerLink="/red-otter/login">Log in</a>
      </p>
    </div>
  </div>
</div>
